<svg font-family='-apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif' viewBox="0 0 640 402" xmlns="http://www.w3.org/2000/svg">
  <!-- 源侧：电网 + 光伏（选配）两路都经 CT 采集盒采样 -->
  <rect x="30" y="24" width="84" height="40" rx="10" fill="#FFFFFF" stroke="#E1E8EF" stroke-width="1.5"/>
  <rect x="30" y="84" width="84" height="40" rx="10" fill="#FBEEDB" stroke="#B45309" stroke-width="1.5"/>
  <rect x="158" y="34" width="110" height="80" rx="10" fill="#E0F1F6" stroke="#0E7490" stroke-width="1.5"/>
  <rect x="312" y="54" width="96" height="40" rx="10" fill="#FFFFFF" stroke="#E1E8EF" stroke-width="1.5"/>
  <rect x="470" y="16" width="120" height="40" rx="10" fill="#EBEFF3" stroke="#56657A" stroke-width="1.5"/>
  <rect x="470" y="92" width="120" height="40" rx="10" fill="#155DFC"/>
  <line x1="114" y1="44" x2="149" y2="44" stroke="#5B6B7E" stroke-width="1.5"/><polygon points="158,44 149,40 149,48" fill="#5B6B7E"/>
  <line x1="114" y1="104" x2="149" y2="104" stroke="#5B6B7E" stroke-width="1.5"/><polygon points="158,104 149,100 149,108" fill="#5B6B7E"/>
  <line x1="268" y1="74" x2="303" y2="74" stroke="#5B6B7E" stroke-width="1.5"/><polygon points="312,74 303,70 303,78" fill="#5B6B7E"/>
  <path d="M 408,64 C 430,54 445,44 461,40" fill="none" stroke="#5B6B7E" stroke-width="1.5"/><polygon points="470,38 461,36 462,44" fill="#5B6B7E"/>
  <path d="M 408,84 C 430,94 445,102 461,106" fill="none" stroke="#5B6B7E" stroke-width="1.5"/><polygon points="470,108 461,102 462,110" fill="#5B6B7E"/>
  <path d="M 213,114 C 245,158 380,158 461,122" fill="none" stroke="#0E7490" stroke-width="1.5" stroke-dasharray="4 4"/>
  <polygon points="470,118 460,119 464,126" fill="#0E7490"/>
  <!-- 分配条：1A ≈ 16.25px，总 32A=520px（x30-550）；段间 2px gap -->
  <rect x="30"  y="258" width="128" height="32" rx="6" fill="#EBEFF3" stroke="#56657A" stroke-width="1"/>
  <rect x="160" y="258" width="390" height="32" rx="6" fill="#155DFC"/>
  <rect x="30"  y="328" width="323" height="32" rx="6" fill="#FBEEDB" stroke="#B45309" stroke-width="1"/>
  <rect x="355" y="328" width="195" height="32" rx="6" fill="#155DFC"/>
  <line x1="550" y1="250" x2="550" y2="368" stroke="#E1E8EF" stroke-width="1" stroke-dasharray="3 3"/>
  <g class="zh">
    <text x="72" y="49" text-anchor="middle" font-size="12" fill="#0B1526">电网</text>
    <text x="72" y="107" text-anchor="middle" font-size="12" fill="#B45309">光伏</text>
    <text x="72" y="139" text-anchor="middle" font-size="9" fill="#5B6B7E">光伏机型</text>
    <text x="213" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">CT 采集盒</text>
    <text x="213" y="86" text-anchor="middle" font-size="9.5" fill="#0E7490">采两路电流</text>
    <text x="360" y="79" text-anchor="middle" font-size="12" fill="#0B1526">家庭配电</text>
    <text x="530" y="41" text-anchor="middle" font-size="12" fill="#56657A">家用电器</text>
    <text x="530" y="117" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">充电桩</text>
    <text x="337" y="168" text-anchor="middle" font-size="10.5" fill="#0E7490">电网 + 光伏实时电流</text>
    <text x="30" y="196" font-size="10.5" fill="#5B6B7E">家庭负载不直接测量：由桩推算 = 进线 + 光伏 − 充电（充电电流来自桩自身计量芯片）</text>
    <text x="30" y="231" font-size="12.5" font-weight="600" fill="#0B1526">「入户上限」32 A 内动态分配</text>
    <text x="550" y="231" text-anchor="end" font-size="10.5" fill="#5B6B7E">← 32 A →</text>
    <text x="30" y="252" font-size="10.5" fill="#5B6B7E">家里用电少 → 充电全速</text>
    <text x="94" y="278" text-anchor="middle" font-size="11" fill="#56657A">家庭 8 A</text>
    <text x="355" y="278" text-anchor="middle" font-size="11.5" font-weight="600" fill="#FFFFFF">充电 24 A</text>
    <text x="30" y="322" font-size="10.5" fill="#5B6B7E">家里用电多 → 桩自动让电</text>
    <text x="191" y="348" text-anchor="middle" font-size="11" fill="#B45309">家庭 20 A</text>
    <text x="452" y="348" text-anchor="middle" font-size="11.5" font-weight="600" fill="#FFFFFF">充电 12 A</text>
    <text x="30" y="392" font-size="10.5" fill="#5B6B7E">充电段不低于「最低充电电流」（6 A 起）；再不足则暂停，负荷下降后自动恢复。</text>
  </g>
</svg>