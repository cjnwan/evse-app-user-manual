<svg font-family='-apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif' viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg">
  <!-- 主流程盒 -->
  <rect x="16" y="40" width="126" height="42" rx="10" fill="#FFFFFF" stroke="#E1E8EF" stroke-width="1.5"/>
  <rect x="180" y="40" width="84" height="42" rx="10" fill="#EAF0FE" stroke="#155DFC" stroke-width="1.5"/>
  <rect x="302" y="40" width="96" height="42" rx="10" fill="#155DFC"/>
  <rect x="436" y="40" width="96" height="42" rx="10" fill="#E4F4EE" stroke="#009966" stroke-width="1.5"/>
  <!-- 主流程箭头 -->
  <line x1="142" y1="61" x2="171" y2="61" stroke="#5B6B7E" stroke-width="1.5"/><polygon points="180,61 171,57 171,65" fill="#5B6B7E"/>
  <line x1="264" y1="61" x2="293" y2="61" stroke="#5B6B7E" stroke-width="1.5"/><polygon points="302,61 293,57 293,65" fill="#5B6B7E"/>
  <line x1="398" y1="61" x2="427" y2="61" stroke="#5B6B7E" stroke-width="1.5"/><polygon points="436,61 427,57 427,65" fill="#5B6B7E"/>
  <!-- 再次充电回环 -->
  <path d="M 484,34 C 460,8 374,8 350,34" fill="none" stroke="#009966" stroke-width="1.5" stroke-dasharray="4 4"/>
  <polygon points="350,34 353,24 359,31" fill="#009966"/>
  <!-- 等待中 -->
  <rect x="180" y="136" width="100" height="38" rx="10" fill="#E0F1F6" stroke="#0E7490" stroke-width="1.5"/>
  <line x1="222" y1="82" x2="222" y2="127" stroke="#0E7490" stroke-width="1.5" stroke-dasharray="4 4"/><polygon points="222,136 218,127 226,127" fill="#0E7490"/>
  <path d="M 280,155 H 350 V 91" fill="none" stroke="#0E7490" stroke-width="1.5" stroke-dasharray="4 4"/><polygon points="350,82 346,91 354,91" fill="#0E7490"/>
  <!-- 桩侧暂停 -->
  <rect x="252" y="226" width="190" height="44" rx="10" fill="#FBEEDB" stroke="#B45309" stroke-width="1.5"/>
  <line x1="330" y1="82" x2="330" y2="217" stroke="#B45309" stroke-width="1.5"/><polygon points="330,226 326,217 334,217" fill="#B45309"/>
  <line x1="368" y1="226" x2="368" y2="91" stroke="#5B6B7E" stroke-width="1.5"/><polygon points="368,82 364,91 372,91" fill="#5B6B7E"/>
  <!-- 车辆已暂停 -->
  <rect x="488" y="226" width="120" height="44" rx="10" fill="#EBEFF3" stroke="#56657A" stroke-width="1.5"/>
  <path d="M 398,74 C 470,84 505,140 533,217" fill="none" stroke="#56657A" stroke-width="1.5" stroke-dasharray="4 4"/>
  <polygon points="535,226 529,218 537,216" fill="#56657A"/>
  <path d="M 560,226 C 580,150 560,110 512,88" fill="none" stroke="#5B6B7E" stroke-width="1.5" stroke-dasharray="4 4"/>
  <polygon points="504,84 514,83 511,91" fill="#5B6B7E"/>
  <g class="en">
    <text x="79" y="57" text-anchor="middle" font-size="10" fill="#0B1526">NO CABLE</text>
    <text x="79" y="70" text-anchor="middle" font-size="10" fill="#0B1526">CONNECTED</text>
    <text x="222" y="65" text-anchor="middle" font-size="11" font-weight="600" fill="#155DFC">READY</text>
    <text x="350" y="65" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">CHARGING</text>
    <text x="484" y="65" text-anchor="middle" font-size="11" font-weight="600" fill="#009966">COMPLETE</text>
    <text x="161" y="53" text-anchor="middle" font-size="9.5" fill="#5B6B7E">plug in</text>
    <text x="283" y="53" text-anchor="middle" font-size="9.5" fill="#5B6B7E">start</text>
    <text x="417" y="53" text-anchor="middle" font-size="9.5" fill="#5B6B7E">ends</text>
    <text x="417" y="16" text-anchor="middle" font-size="10.5" fill="#009966">Charge Again</text>
    <text x="230" y="159" text-anchor="middle" font-size="11" font-weight="600" fill="#0E7490">WAITING</text>
    <text x="214" y="112" text-anchor="end" font-size="10" fill="#5B6B7E">schedule set</text>
    <text x="328" y="170" text-anchor="middle" font-size="10" fill="#5B6B7E">starts at set time</text>
    <text x="347" y="252" text-anchor="middle" font-size="10" fill="#B45309">Charging paused by the charger</text>
    <text x="322" y="204" text-anchor="end" font-size="10" fill="#5B6B7E">protection / schedule</text>
    <text x="376" y="204" text-anchor="start" font-size="10" fill="#5B6B7E">Resume</text>
    <text x="548" y="252" text-anchor="middle" font-size="10" fill="#56657A">VEHICLE PAUSED</text>
    <text x="508" y="150" text-anchor="start" font-size="10" fill="#5B6B7E">vehicle request</text>
    <text x="592" y="180" text-anchor="start" font-size="10" fill="#5B6B7E">Stop</text>
  </g>
</svg>