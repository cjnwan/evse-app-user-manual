  <line x1="550" y1="222" x2="550" y2="340" stroke="#E1E8EF" stroke-width="1" stroke-dasharray="3 3"/>
  <g class="zh">
    <text x="72" y="67" text-anchor="middle" font-size="12" fill="#0B1526">电网</text>
    <text x="213" y="67" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">CT 采集盒</text>
    <text x="360" y="67" text-anchor="middle" font-size="12" fill="#0B1526">家庭配电</text>
    <text x="530" y="37" text-anchor="middle" font-size="12" fill="#56657A">家用电器</text>
    <text x="530" y="101" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">充电桩</text>
    <text x="330" y="152" text-anchor="middle" font-size="10.5" fill="#0E7490">实时电流读数</text>
    <text x="30" y="203" font-size="12.5" font-weight="600" fill="#0B1526">「入户上限」32 A 内动态分配</text>
    <text x="550" y="203" text-anchor="end" font-size="10.5" fill="#5B6B7E">← 32 A →</text>
    <text x="30" y="224" font-size="10.5" fill="#5B6B7E">家里用电少 → 充电全速</text>
    <text x="94" y="250" text-anchor="middle" font-size="11" fill="#56657A">家庭 8 A</text>
    <text x="355" y="250" text-anchor="middle" font-size="11.5" font-weight="600" fill="#FFFFFF">充电 24 A</text>
    <text x="30" y="294" font-size="10.5" fill="#5B6B7E">家里用电多 → 桩自动让电</text>
    <text x="191" y="320" text-anchor="middle" font-size="11" fill="#B45309">家庭 20 A</text>
    <text x="452" y="320" text-anchor="middle" font-size="11.5" font-weight="600" fill="#FFFFFF">充电 12 A</text>
    <text x="30" y="362" font-size="10.5" fill="#5B6B7E">充电段不低于「最低充电电流」（6 A 起）；再不足则暂停，负荷下降后自动恢复。</text>
